name: Update split IP lists

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate split lists
        run: |
          chmod +x scripts/get.sh
          ./scripts/get.sh split

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add list-ipv4.rsc list-ipv6.rsc

          if git diff --cached --quiet; then
            echo "No IP list changes"
          else
            git commit -m "Automatic split IP list update"
            git push
          fi
